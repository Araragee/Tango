<body class="bg-background text-on-background min-h-screen pb-[100px] font-sans antialiased">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-5 h-16 bg-stone-50/80 backdrop-blur-md text-slate-500 font-manrope text-sm tracking-tight sticky top-0 z-50 border-b border-slate-200/50 shadow-sm">
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-200 flex items-center justify-center w-touch-target h-touch-target -ml-4">
<span class="material-symbols-outlined">menu</span>
</button>
<div class="text-lg font-semibold text-slate-700 tracking-tight">

<span class="material-symbols-outlined">account_circle</span>
</button>
</header>

<!-- Header Section -->
<div class="mb-lg">
<h1 class="font-h1 text-h1 text-on-background mb-xs">Our Plans</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Tracking our shared milestones and goals.</p>
</div>
<!-- Add New Goal Button -->
<button class="w-full flex items-center justify-center gap-sm bg-primary text-on-primary rounded-full h-[56px] font-button text-button shadow-[0_4px_12px_rgba(60,95,125,0.15)] active:scale-95 transition-transform duration-200 mb-xl">
<span class="material-symbols-outlined">add</span>
            Add New Goal
        </button>
<!-- Goals Grid / List -->
<div class="flex flex-col gap-lg">
<!-- Card 1: Feature Goal (Image Background) -->
<div class="bg-surface-container-lowest rounded-[24px] overflow-hidden shadow-[0_8px_24px_-4px_rgba(0,0,0,0.05)] border border-surface-container-low transition-transform active:scale-[0.98]">
<div class="h-[160px] w-full relative">
<img alt="Scenic ocean view with sandy beach, palm trees, and clear blue water during a sunny summer day" class="w-full h-full object-cover" data-alt="Scenic ocean view with sandy beach, palm trees, and clear blue water during a sunny summer day" src="https://lh3.googleusercontent.com/aida-public/AB6AXuADMaFWqQ6jI4LEMjAI3JUaN8WFWHS6Q0ojJFxBESOQFBO5rPW1Ly4XifEfhQXldLOZmuZE2BzO98z8VXo7C8NXfoQsZK9hIr4HiaBYciuraFDCTTIUwUMBHen8VrP1Kwiegy58JuFXjV1daGqedlgDgcGHH8FSQdg4s5RmYi62wUgqqIl647QkKYHCVUQXrjk1kAbZfFi4o8HdIflREeIBvHg8WzSFP2VNk_9lw1hAVL7mjcYCk-8swPPdkZm9gMmp5Z9fpjrO2P0"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
<div class="absolute bottom-md left-md right-md flex justify-between items-end">
<div class="text-white">
<span class="font-label-caps text-label-caps opacity-90 block mb-xs">VACATION</span>
<h2 class="font-h2 text-h2 text-white">Summer Trip</h2>
</div>
<div class="bg-white/20 backdrop-blur-md rounded-full px-sm py-xs flex items-center gap-xs text-white">
<span class="material-symbols-outlined text-[16px]">flight_takeoff</span>
</div>
</div>
</div>
<div class="p-lg">
<div class="flex justify-between items-end mb-sm">
<div class="flex flex-col">
<span class="font-body-md text-body-md text-on-surface font-semibold">$1,950</span>
<span class="font-body-md text-body-md text-on-surface-variant text-sm">of $3,000</span>
</div>
<span class="font-button text-button text-primary">65%</span>
</div>
<!-- Progress Bar -->
<div class="w-full h-2 bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full transition-all duration-1000 ease-out" style="width: 65%;"></div>
</div>
</div>
</div>

</div>
<div>

<div class="pt-sm">

<span class="font-body-md text-body-md text-on-surface-variant text-sm">of $10,000</span>
</div>
<span class="font-button text-button text-primary">85%</span>
</div>

<div class="w-full h-2 bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full transition-all duration-1000 ease-out" style="width: 85%;"></div>
