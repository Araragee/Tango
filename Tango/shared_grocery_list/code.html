<!DOCTYPE html>

<style>
        body {
            background-color: #0f172a; /* Slate 900 for deep background */
            color: #e2e8f0; /* Slate 200 for default text */
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom Checkbox Styling to match Primary Accent */
        input[type="checkbox"]:checked {
            background-color: theme('colors.primary');
            border-color: theme('colors.primary');
        }
        input[type="checkbox"]:focus {
            --tw-ring-color: theme('colors.primary');
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="font-body-md text-body-md antialiased pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center px-4 h-14 bg-slate-50 dark:bg-slate-900 border-b border-slate-200/60 dark:border-slate-800 shadow-sm dark:shadow-none">
<button class="flex items-center justify-center w-touch-target h-touch-target active:scale-95 transition-transform duration-200 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full mr-2 text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-manrope text-lg font-semibold flex-grow text-slate-800 dark:text-slate-100 text-center mr-[48px]">Grocery List</h1>
</header>
<!-- Main Canvas -->
<main class="pt-20 px-edge-margin max-w-md mx-auto">
<!-- Category: Produce -->
<section class="mb-lg">
<h2 class="font-h2 text-h2 text-slate-300 mb-sm">Produce</h2>
<div class="space-y-base">
<!-- Item Card -->
<div class="bg-slate-800 rounded-xl p-md flex items-center border border-slate-700/50 shadow-sm">
<input class="w-6 h-6 rounded-md border-slate-600 bg-slate-900 mr-md focus:ring-primary focus:ring-offset-slate-800 cursor-pointer" type="checkbox"/>
<div class="flex-grow">
<p class="font-body-lg text-body-lg text-slate-100">Avocados</p>
<p class="font-label-caps text-label-caps text-slate-400 mt-1">Added by Alex</p>
</div>
<div class="flex items-center bg-slate-900 rounded-full border border-slate-700">
<button class="w-8 h-8 flex items-center justify-center text-slate-300 hover:text-white active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[18px]">remove</span>
</button>
<span class="font-button text-button w-6 text-center text-slate-200">2</span>
<button class="w-8 h-8 flex items-center justify-center text-slate-300 hover:text-white active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[18px]">add</span>
</button>
</div>
</div>
<!-- Item Card -->
<div class="bg-slate-800 rounded-xl p-md flex items-center border border-slate-700/50 shadow-sm">
<input class="w-6 h-6 rounded-md border-slate-600 bg-slate-900 mr-md focus:ring-primary focus:ring-offset-slate-800 cursor-pointer" type="checkbox"/>
<div class="flex-grow">
<p class="font-body-lg text-body-lg text-slate-100">Spinach</p>
<p class="font-label-caps text-label-caps text-slate-400 mt-1">Added by Taylor</p>
</div>
<div class="flex items-center bg-slate-900 rounded-full border border-slate-700">
<button class="w-8 h-8 flex items-center justify-center text-slate-300 hover:text-white active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[18px]">remove</span>
</button>
<span class="font-button text-button w-6 text-center text-slate-200">1</span>
<button class="w-8 h-8 flex items-center justify-center text-slate-300 hover:text-white active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[18px]">add</span>
</button>
</div>
</div>
</div>
</section>
<!-- Category: Dairy & Eggs -->
<section class="mb-lg">
<h2 class="font-h2 text-h2 text-slate-300 mb-sm">Dairy &amp; Eggs</h2>
<div class="space-y-base">
<!-- Item Card (Completed state example) -->
<div class="bg-slate-800/60 rounded-xl p-md flex items-center border border-slate-700/30 opacity-70">
<input checked="" class="w-6 h-6 rounded-md border-slate-600 bg-slate-900 mr-md focus:ring-primary focus:ring-offset-slate-800 cursor-pointer" type="checkbox"/>
<div class="flex-grow">
<p class="font-body-lg text-body-lg text-slate-400 line-through">Oat Milk</p>
<p class="font-label-caps text-label-caps text-slate-500 mt-1">Added by Alex</p>
</div>
<div class="flex items-center bg-slate-900/50 rounded-full border border-slate-700/50 pointer-events-none">
<button class="w-8 h-8 flex items-center justify-center text-slate-500">
<span class="material-symbols-outlined text-[18px]">remove</span>
</button>
<span class="font-button text-button w-6 text-center text-slate-500">2</span>
<button class="w-8 h-8 flex items-center justify-center text-slate-500">
<span class="material-symbols-outlined text-[18px]">add</span>
</button>
</div>
</div>
<!-- Item Card -->
<div class="bg-slate-800 rounded-xl p-md flex items-center border border-slate-700/50 shadow-sm">
<input class="w-6 h-6 rounded-md border-slate-600 bg-slate-900 mr-md focus:ring-primary focus:ring-offset-slate-800 cursor-pointer" type="checkbox"/>
<div class="flex-grow">
<p class="font-body-lg text-body-lg text-slate-100">Free Range Eggs</p>
<p class="font-label-caps text-label-caps text-slate-400 mt-1">Added by Alex</p>
</div>
<div class="flex items-center bg-slate-900 rounded-full border border-slate-700">
<button class="w-8 h-8 flex items-center justify-center text-slate-300 hover:text-white active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[18px]">remove</span>
</button>
<span class="font-button text-button w-6 text-center text-slate-200">1</span>
<button class="w-8 h-8 flex items-center justify-center text-slate-300 hover:text-white active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[18px]">add</span>
</button>
</div>
</div>
</div>
</section>

<h2 class="font-h2 text-h2 text-slate-300 mb-sm">Pantry</h2>
<div class="space-y-base">
<!-- Item Card -->
<div class="bg-slate-800 rounded-xl p-md flex items-center border border-slate-700/50 shadow-sm">
<input class="w-6 h-6 rounded-md border-slate-600 bg-slate-900 mr-md focus:ring-primary focus:ring-offset-slate-800 cursor-pointer" type="checkbox"/>
<div class="flex-grow">
<p class="font-body-lg text-body-lg text-slate-100">Olive Oil</p>
<p class="font-label-caps text-label-caps text-slate-400 mt-1">Added by Taylor</p>
</div>
<div class="flex items-center bg-slate-900 rounded-full border border-slate-700">
<button class="w-8 h-8 flex items-center justify-center text-slate-300 hover:text-white active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[18px]">remove</span>
</button>
<span class="font-button text-button w-6 text-center text-slate-200">1</span>
<button class="w-8 h-8 flex items-center justify-center text-slate-300 hover:text-white active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[18px]">add</span>
</button>
</div>
</div>
</div>
</section>
<!-- Clear Action -->
<div class="flex justify-center mb-xl">
<button class="font-button text-button text-slate-400 hover:text-slate-200 flex items-center px-lg py-sm rounded-full border border-slate-700 active:scale-95 transition-all">
<span class="material-symbols-outlined mr-2 text-[18px]">delete_sweep</span>
                Clear Completed Items
            </button>
</div>
</main>
<!-- Quick Add Input (Sticky Bottom) -->
<div class="fixed bottom-0 left-0 w-full z-40 bg-slate-950/90 backdrop-blur-xl border-t border-slate-800 p-4 pb-8">
<div class="max-w-md mx-auto flex items-center gap-sm">
<div class="flex-grow relative">
<input class="w-full h-14 bg-slate-800 border border-slate-700 rounded-full pl-lg pr-md font-body-md text-slate-100 placeholder-slate-500 focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none" placeholder="Add new item..." type="text"/>
</div>
<button class="w-14 h-14 bg-primary text-white rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform flex-shrink-0">
<span class="material-symbols-outlined" data-icon="add" data-weight="fill">add</span>
</button>
</div>
</div>
</body></html>
