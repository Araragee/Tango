<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Day-to-Day To-Dos</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Manrope:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#1c1c19",
                        "surface-container-low": "#f1f4fb",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#eef1f8",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#3c5f7d",
                        "on-tertiary": "#ffffff",
                        "outline-variant": "#c2c7ce",
                        "secondary-container": "#c7eae1",
                        "primary-container": "#557897",
                        "on-error": "#ffffff",
                        "surface-container-highest": "#dfe2ea",
                        "tertiary-fixed-dim": "#c9c6c2",
                        "on-secondary-fixed-variant": "#2d4c46",
                        "on-tertiary-container": "#fcffe3",
                        "primary-fixed": "#cde5ff",
                        "primary-fixed-dim": "#a7caed",
                        "background": "#f8f9ff",
                        "tertiary-fixed": "#e5e2dd",
                        "on-primary-fixed": "#001d31",
                        "on-surface-variant": "#42474d",
                        "on-tertiary-fixed-variant": "#474743",
                        "inverse-primary": "#a7caed",
                        "surface-variant": "#dfe2ea",
                        "error": "#ba1a1a",
                        "on-secondary-container": "#4b6a63",
                        "surface-dim": "#d7dae1",
                        "surface-container": "#ebeef5",
                        "surface-bright": "#f8f9ff",
                        "surface": "#f8f9ff",
                        "outline": "#72777e",
                        "inverse-surface": "#2d3136",
                        "surface-container-high": "#e5e8ef",
                        "secondary": "#45645e",
                        "tertiary-container": "#767471",
                        "on-secondary-fixed": "#00201b",
                        "on-background": "#181c21",
                        "on-secondary": "#ffffff",
                        "on-surface": "#181c21",
                        "error-container": "#ffdad6",
                        "tertiary": "#5d5c58",
                        "on-primary-fixed-variant": "#254a67",
                        "secondary-fixed": "#c7eae1",
                        "surface-tint": "#3e6280",
                        "secondary-fixed-dim": "#accec5",
                        "on-primary-container": "#fdfcff",
                        "on-error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "edge-margin": "20px",
                        "md": "16px",
                        "lg": "24px",
                        "base": "8px",
                        "touch-target": "48px",
                        "sm": "12px",
                        "xl": "40px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "h1": ["Manrope"],
                        "button": ["Inter"],
                        "label-caps": ["Inter"],
                        "body-md": ["Inter"],
                        "h2": ["Manrope"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "h1": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "button": ["16px", {"lineHeight": "1", "letterSpacing": "0.01em", "fontWeight": "600"}],
                        "label-caps": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400"}],
                        "h2": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
<style>
        .tinted-shadow {
            box-shadow: 0 8px 24px -4px rgba(60, 95, 125, 0.08);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill-icon {
            font-variation-settings: 'FILL' 1;
        }
        /* Custom Checkbox Animation easing */
        .spring-bounce {
            transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        /* Hide scrollbar for bottom sheet */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col antialiased overflow-x-hidden">
<!-- TopAppBar from JSON -->
<header class="docked full-width top-0 sticky z-40 bg-stone-50/80 dark:bg-stone-950/80 backdrop-blur-md border-b border-slate-200/50 dark:border-slate-800/50 shadow-sm flex justify-between items-center w-full px-5 h-16">
<button class="text-slate-500 dark:text-slate-400 hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200 w-touch-target h-touch-target flex items-center justify-center">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="text-lg font-semibold text-slate-700 dark:text-slate-200 tracking-tight font-manrope">PartnerSpace</h1>
<button class="text-slate-500 dark:text-slate-400 hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200 w-touch-target h-touch-target flex items-center justify-center">
<span class="material-symbols-outlined">account_circle</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-edge-margin pt-lg pb-32 max-w-2xl mx-auto w-full relative z-0">
<header class="mb-xl">
<h1 class="font-h1 text-h1 text-on-surface">Day-to-Day</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-xs">Shared tasks and reminders</p>
</header>
<!-- Grocery List Group -->
<section class="mb-xl">
<div class="flex items-center mb-md">
<span class="material-symbols-outlined text-secondary mr-sm">shopping_cart</span>
<h2 class="font-h2 text-h2 text-on-surface">Grocery List</h2>
</div>
<div class="flex flex-col gap-base overflow-hidden px-1 py-1 -mx-1">
<!-- Unchecked Task with Swipe Hint -->
<div class="relative group rounded-xl bg-error overflow-hidden">
<!-- Swipe Action Background (Delete) -->
<div class="absolute inset-y-0 right-0 w-24 flex items-center justify-center bg-error text-on-error">
<span class="material-symbols-outlined">delete</span>
</div>
<!-- Task Front Card -->
<label class="relative block bg-surface-container-lowest rounded-xl tinted-shadow p-sm flex items-center cursor-pointer transition-transform duration-300 ease-out active:scale-[0.98] transform group-active:-translate-x-12 z-10">
<input class="peer sr-only" type="checkbox"/>
<div class="w-touch-target h-touch-target flex items-center justify-center shrink-0">
<div class="w-6 h-6 rounded border-2 border-outline-variant peer-checked:border-primary peer-checked:bg-primary transition-all duration-300 spring-bounce peer-active:scale-90 flex items-center justify-center relative overflow-hidden">
<span class="material-symbols-outlined text-on-primary text-[18px] opacity-0 scale-50 peer-checked:opacity-100 peer-checked:scale-100 transition-all duration-300 delay-100 spring-bounce">check</span>
</div>
</div>
<div class="flex-1 ml-xs relative">
<p class="font-body-md text-body-md text-on-surface transition-colors duration-300 peer-checked:text-on-surface-variant">Oat milk (Barista blend)</p>
<!-- Strikethrough Animation -->
<div class="absolute left-0 top-1/2 h-[1.5px] bg-on-surface-variant w-0 peer-checked:w-full transition-all duration-300 ease-out -translate-y-1/2 rounded-full"></div>
</div>
</label>
</div>
<!-- Checked Task -->
<div class="relative group rounded-xl overflow-hidden">
<label class="relative block bg-surface-container-lowest rounded-xl tinted-shadow p-sm flex items-center cursor-pointer transition-all duration-300 ease-out active:scale-[0.98] opacity-60 hover:opacity-100 z-10">
<input checked="" class="peer sr-only" type="checkbox"/>
<div class="w-touch-target h-touch-target flex items-center justify-center shrink-0">
<div class="w-6 h-6 rounded border-2 border-primary bg-primary transition-all duration-300 spring-bounce peer-active:scale-90 flex items-center justify-center relative overflow-hidden">
<span class="material-symbols-outlined text-on-primary text-[18px] opacity-100 scale-100 peer-checked:opacity-100 peer-checked:scale-100 transition-all duration-300 delay-100 spring-bounce">check</span>
</div>
</div>
<div class="flex-1 ml-xs relative">
<p class="font-body-md text-body-md text-on-surface-variant">Fresh spinach</p>
<div class="absolute left-0 top-1/2 h-[1.5px] bg-on-surface-variant w-full transition-all duration-300 ease-out -translate-y-1/2 rounded-full"></div>
</div>
</label>
</div>
</div>
</section>
<!-- House Chores Group -->
<section class="mb-xl">
<div class="flex items-center mb-md">
<span class="material-symbols-outlined text-secondary mr-sm">home_work</span>
<h2 class="font-h2 text-h2 text-on-surface">House Chores</h2>
</div>
<div class="flex flex-col gap-base px-1 py-1 -mx-1">
<!-- Unchecked Task with Assignee visual cue -->
<div class="relative group rounded-xl bg-error overflow-hidden">
<div class="absolute inset-y-0 right-0 w-24 flex items-center justify-center bg-error text-on-error">
<span class="material-symbols-outlined">delete</span>
</div>
<label class="relative block bg-surface-container-lowest rounded-xl tinted-shadow p-sm flex items-center cursor-pointer transition-transform duration-300 ease-out active:scale-[0.98] transform group-active:-translate-x-4 z-10">
<input class="peer sr-only" type="checkbox"/>
<div class="w-touch-target h-touch-target flex items-center justify-center shrink-0">
<div class="w-6 h-6 rounded border-2 border-outline-variant peer-checked:border-primary peer-checked:bg-primary transition-all duration-300 spring-bounce peer-active:scale-90 flex items-center justify-center relative overflow-hidden">
<span class="material-symbols-outlined text-on-primary text-[18px] opacity-0 scale-50 peer-checked:opacity-100 peer-checked:scale-100 transition-all duration-300 delay-100 spring-bounce">check</span>
</div>
</div>
<div class="flex-1 ml-xs relative flex items-center justify-between">
<div class="relative inline-block">
<p class="font-body-md text-body-md text-on-surface transition-colors duration-300 peer-checked:text-on-surface-variant">Run the dishwasher</p>
<div class="absolute left-0 top-1/2 h-[1.5px] bg-on-surface-variant w-0 peer-checked:w-full transition-all duration-300 ease-out -translate-y-1/2 rounded-full"></div>
</div>
<div class="bg-secondary-container text-on-secondary-container text-[10px] font-bold px-2 py-1 rounded-full uppercase tracking-wider ml-sm shrink-0 transition-opacity peer-checked:opacity-50">
                Shared
            </div>
</div>
</label>
</div>
<!-- Unchecked Task -->
<div class="relative group rounded-xl bg-error overflow-hidden">
<div class="absolute inset-y-0 right-0 w-24 flex items-center justify-center bg-error text-on-error">
<span class="material-symbols-outlined">delete</span>
</div>
<label class="relative block bg-surface-container-lowest rounded-xl tinted-shadow p-sm flex items-center cursor-pointer transition-transform duration-300 ease-out active:scale-[0.98] transform z-10">
<input class="peer sr-only" type="checkbox"/>
<div class="w-touch-target h-touch-target flex items-center justify-center shrink-0">
<div class="w-6 h-6 rounded border-2 border-outline-variant peer-checked:border-primary peer-checked:bg-primary transition-all duration-300 spring-bounce peer-active:scale-90 flex items-center justify-center relative overflow-hidden">
<span class="material-symbols-outlined text-on-primary text-[18px] opacity-0 scale-50 peer-checked:opacity-100 peer-checked:scale-100 transition-all duration-300 delay-100 spring-bounce">check</span>
</div>
</div>
<div class="flex-1 ml-xs relative">
<div class="relative inline-block">
<p class="font-body-md text-body-md text-on-surface transition-colors duration-300 peer-checked:text-on-surface-variant">Take out recycling</p>
<div class="absolute left-0 top-1/2 h-[1.5px] bg-on-surface-variant w-0 peer-checked:w-full transition-all duration-300 ease-out -translate-y-1/2 rounded-full"></div>
</div>
<p class="text-[12px] text-on-surface-variant mt-1 transition-opacity peer-checked:opacity-50">Tuesday morning</p>
</div>
</label>
</div>
</div>
</section>
<!-- Work Group -->
<section class="mb-xl">
<div class="flex items-center mb-md">
<span class="material-symbols-outlined text-secondary mr-sm">work</span>
<h2 class="font-h2 text-h2 text-on-surface">Work</h2>
</div>
<div class="flex flex-col gap-base px-1 py-1 -mx-1">
<!-- Unchecked Task -->
<div class="relative group rounded-xl bg-error overflow-hidden">
<div class="absolute inset-y-0 right-0 w-24 flex items-center justify-center bg-error text-on-error">
<span class="material-symbols-outlined">delete</span>
</div>
<label class="relative block bg-surface-container-lowest rounded-xl tinted-shadow p-sm flex items-center cursor-pointer transition-transform duration-300 ease-out active:scale-[0.98] transform z-10">
<input class="peer sr-only" type="checkbox"/>
<div class="w-touch-target h-touch-target flex items-center justify-center shrink-0">
<div class="w-6 h-6 rounded border-2 border-outline-variant peer-checked:border-primary peer-checked:bg-primary transition-all duration-300 spring-bounce peer-active:scale-90 flex items-center justify-center relative overflow-hidden">
<span class="material-symbols-outlined text-on-primary text-[18px] opacity-0 scale-50 peer-checked:opacity-100 peer-checked:scale-100 transition-all duration-300 delay-100 spring-bounce">check</span>
</div>
</div>
<div class="flex-1 ml-xs relative">
<div class="relative inline-block">
<p class="font-body-md text-body-md text-on-surface transition-colors duration-300 peer-checked:text-on-surface-variant">Review tax documents</p>
<div class="absolute left-0 top-1/2 h-[1.5px] bg-on-surface-variant w-0 peer-checked:w-full transition-all duration-300 ease-out -translate-y-1/2 rounded-full"></div>
</div>
</div>
</label>
</div>
</div>
</section>
<!-- FAB Trigger & Input (Bottom Sheet CSS Hack) -->
<input class="peer/fab sr-only" id="fab-sheet-toggle" type="checkbox"/>
<!-- Floating Action Button -->
<label class="fixed bottom-28 right-edge-margin md:right-auto md:ml-[calc(100%-160px)] z-40 cursor-pointer block" for="fab-sheet-toggle">
<div class="bg-primary hover:bg-primary/90 text-on-primary rounded-full h-14 px-6 flex items-center justify-center shadow-[0_8px_24px_rgba(60,95,125,0.3)] transition-transform duration-200 active:scale-95 focus:outline-none spring-bounce peer-checked/fab:scale-90 peer-checked/fab:opacity-0">
<span class="material-symbols-outlined mr-2">add</span>
<span class="font-button text-button">Add Task</span>
</div>
</label>
<!-- Bottom Sheet Overlay -->
<div class="fixed inset-0 bg-black/30 backdrop-blur-[2px] z-[55] opacity-0 pointer-events-none transition-opacity duration-300 peer-checked/fab:opacity-100 peer-checked/fab:pointer-events-auto">
<label class="absolute inset-0 block cursor-default" for="fab-sheet-toggle"></label>
</div>
<!-- Bottom Sheet Content -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest rounded-t-[32px] z-[60] translate-y-full transition-transform duration-400 ease-[cubic-bezier(0.2,0.8,0.2,1)] peer-checked/fab:translate-y-0 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] pb-safe">
<div class="p-6">
<div class="w-12 h-1.5 bg-outline-variant/30 rounded-full mx-auto mb-6"></div>
<h3 class="font-h2 text-[20px] text-on-surface mb-4">New Task</h3>
<input autofocus="" class="w-full bg-surface px-4 py-4 rounded-xl border-none focus:ring-2 focus:ring-primary/20 text-body-lg mb-4 tinted-shadow outline-none placeholder:text-outline" placeholder="What needs to be done?" type="text"/>
<div class="flex gap-2 mb-6 overflow-x-auto no-scrollbar pb-2">
<button class="flex items-center gap-1.5 px-4 py-2 rounded-full border border-outline-variant text-sm text-on-surface-variant whitespace-nowrap active:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-[18px]">calendar_today</span>
                Today
            </button>
<button class="flex items-center gap-1.5 px-4 py-2 rounded-full border border-outline-variant text-sm text-on-surface-variant whitespace-nowrap active:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-[18px]">person_add</span>
                Assign
            </button>
<button class="flex items-center gap-1.5 px-4 py-2 rounded-full border border-outline-variant text-sm text-on-surface-variant whitespace-nowrap active:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-[18px]">flag</span>
                Priority
            </button>
</div>
<div class="flex justify-end gap-3">
<label class="px-6 py-3 font-button text-on-surface-variant rounded-full active:bg-surface-variant transition-colors cursor-pointer block" for="fab-sheet-toggle">Cancel</label>
<button class="px-6 py-3 bg-primary text-on-primary font-button rounded-full shadow-lg active:scale-95 transition-transform">Save Task</button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar from JSON -->
<!-- Active Tab: To-Dos -->
<nav class="fixed bottom-0 w-full z-40 rounded-t-[32px] bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl border-t border-slate-100 dark:border-slate-800 shadow-[0_-4px_20px_0_rgba(0,0,0,0.05)] md:hidden">
<div class="fixed bottom-0 left-0 w-full h-20 flex justify-around items-center px-4 pb-safe">
<!-- Budget (Inactive) -->
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-1.5 hover:bg-slate-50/50 dark:hover:bg-slate-800/50 active:scale-95 transition-all duration-300 ease-out focus:outline-none">
<span class="material-symbols-outlined mb-1">payments</span>
<span class="font-manrope text-[10px] font-medium uppercase tracking-widest">Budget</span>
</button>
<!-- Plans (Inactive) -->
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-1.5 hover:bg-slate-50/50 dark:hover:bg-slate-800/50 active:scale-95 transition-all duration-300 ease-out focus:outline-none">
<span class="material-symbols-outlined mb-1">assignment</span>
<span class="font-manrope text-[10px] font-medium uppercase tracking-widest">Plans</span>
</button>
<!-- To-Dos (Active) -->
<button class="flex flex-col items-center justify-center bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-slate-50 rounded-full px-5 py-1.5 hover:bg-slate-50/50 dark:hover:bg-slate-800/50 active:scale-95 transition-all duration-300 ease-out focus:outline-none">
<span class="material-symbols-outlined fill-icon mb-1">fact_check</span>
<span class="font-manrope text-[10px] font-medium uppercase tracking-widest">To-Dos</span>
</button>
<!-- Calendar (Inactive) -->
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-1.5 hover:bg-slate-50/50 dark:hover:bg-slate-800/50 active:scale-95 transition-all duration-300 ease-out focus:outline-none">
<span class="material-symbols-outlined mb-1">calendar_month</span>
<span class="font-manrope text-[10px] font-medium uppercase tracking-widest">Calendar</span>
</button>
</div>
</nav>
</body></html>
