</div>

<span class="material-symbols-outlined text-on-secondary font-bold text-[20px]" style="font-variation-settings: 'FILL' 1;">star</span>
</div>

<div class="pt-md">
<button class="bg-surface text-primary pixel-border hard-shadow btn-active font-body-md text-body-md font-bold px-8 py-4 transition-transform uppercase tracking-wider">

</div>

<!-- Feature 1: Shared Calendar -->
<div class="bg-surface pixel-border flex flex-col h-full hard-shadow">
