<style>

</div>

<div class="flex items-center gap-2 mb-4 relative z-10">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">local_florist</span>
<h2 class="font-label-sm text-label-sm text-secondary uppercase tracking-widest">Phrase of the Day</h2>
</div>
<p class="font-headline-md text-headline-md text-on-surface relative z-10">"Grow together, one pixel at a time."</p>
</div>
<!-- Task List Container -->
<div class="flex flex-col gap-4">
<div class="flex justify-between items-end mb-2 border-b-2 border-on-background pb-2">

<span class="bg-primary-container text-on-primary-container pixel-border-sm font-label-sm text-label-sm px-3 py-1 uppercase">2 / 5</span>
</div>
<!-- Task Items -->
<label class="bg-surface pixel-border p-4 flex items-center gap-4 cursor-pointer hover:bg-surface-container-low transition-colors hard-shadow">

</div>
<div class="flex flex-col flex-grow">

<label class="bg-surface pixel-border p-4 flex items-center gap-4 cursor-pointer hover:bg-surface-container-low transition-colors hard-shadow">

</div>

<label class="bg-surface pixel-border p-4 flex items-center gap-4 cursor-pointer hover:bg-surface-container-low transition-colors hard-shadow">

<span class="font-body-lg text-body-lg text-on-surface">Walk the dog (long route)</span>
<span class="font-label-sm text-label-sm text-outline uppercase mt-1">Assigned: Sam</span>
</div>
<span class="bg-primary-container text-on-primary-container pixel-border-sm font-label-sm text-label-sm px-3 py-1 uppercase">High</span>
</label>
<label class="bg-surface pixel-border p-4 flex items-center gap-4 cursor-pointer hover:bg-surface-container-low transition-colors hard-shadow">

<span class="font-body-lg text-body-lg text-on-surface">Call landlord about sink</span>

</div>

<label class="bg-surface pixel-border p-4 flex items-center gap-4 cursor-pointer hover:bg-surface-container-low transition-colors hard-shadow">

<span class="font-body-lg text-body-lg text-on-surface">Plan weekend trip</span>
<span class="font-label-sm text-label-sm text-outline uppercase mt-1">Assigned: Both</span>
</div>
</label>

<input class="w-full sunken-input px-4 py-3 font-body-md text-body-md focus:outline-none focus:ring-0" placeholder="What needs doing?" type="text"/>
<div class="flex justify-between items-center mt-2">
<div class="flex gap-2">
<button class="bg-surface-variant text-on-surface-variant pixel-border-sm font-label-sm text-label-sm px-3 py-1 hover:bg-surface-dim transition-colors uppercase">Both</button>
<button class="bg-surface-variant text-on-surface-variant pixel-border-sm font-label-sm text-label-sm px-3 py-1 hover:bg-surface-dim transition-colors uppercase">Alex</button>
<button class="bg-surface-variant text-on-surface-variant pixel-border-sm font-label-sm text-label-sm px-3 py-1 hover:bg-surface-dim transition-colors uppercase">Sam</button>
</div>
<button class="bg-primary text-on-primary pixel-border hard-shadow-dark btn-active font-body-md text-body-md font-bold px-6 py-2 transition-transform uppercase">Add</button>
