<style>
        .pixel-border { border: 2px solid #1c1c19; }
        .pixel-border-sm { border: 1px solid #1c1c19; }
        .hard-shadow { box-shadow: 4px 4px 0px 0px #983e4b; }
        .hard-shadow-dark { box-shadow: 4px 4px 0px 0px #1c1c19; }
        .btn-active:active { transform: translate(2px, 2px); box-shadow: none !important; }
        .bg-dither { background-image: repeating-linear-gradient(45deg, #e5e2dd 25%, transparent 25%, transparent 75%, #e5e2dd 75%, #e5e2dd), repeating-linear-gradient(45deg, #e5e2dd 25%, #fcf9f4 25%, #fcf9f4 75%, #e5e2dd 75%, #e5e2dd); background-position: 0 0, 4px 4px; background-size: 8px 8px; }
        .sunken-input { border-top: 2px solid #e5e2dd; border-left: 2px solid #e5e2dd; border-bottom: 1px solid #ffffff; border-right: 1px solid #ffffff; background-color: #f6f3ee; }

<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-gutter bg-dither">
<!-- Main Container -->
<main class="w-full max-w-md mx-auto bg-surface pixel-border hard-shadow p-lg flex flex-col items-center">
<!-- Brand Header -->
<div class="mb-xl text-center flex flex-col items-center gap-sm mt-lg">
<img alt="Pixel art heart logo" class="w-24 h-24 mb-sm" data-alt="8-bit style pixel art heart logo in rosy red and deep black outlines on a cream background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB2o8JZovggWrYFikaCb8n4CsqsFGKx0LTJTgm9G5yd-GnONOYZ5J9z_h_byPMRykqDUVdKceN6FcS4Zocaftwa8xTKU9TvNvFf_nRMe6m1mmn-Li0gENhyOfEj_719nCEB-oTeAKzRYH_PmpxDTeTHu3ZoMrnKM5MKmmGe-CsWeqtJK3qlLb0F2_GWlsIok6MYJOfLdaTEQCeIizGgNa-9fSjfHxaufa0rxaZfULVMQRUP3AI7QhofsockJCUdtmEDtsdVGkrG67U"/>
<h1 class="font-headline-xl text-headline-xl text-primary tracking-tighter italic">Tango</h1>
<p class="font-body-md text-body-md text-on-surface-variant font-bold uppercase tracking-wider">Welcome Back</p>
</div>
<!-- Login Form -->
<form class="w-full flex flex-col gap-lg">
<!-- Username Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-background" for="username">Username</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 1;">person</span>
<input class="w-full sunken-input pl-xl pr-sm py-3 font-body-md text-body-md focus:outline-none focus:ring-0" id="username" placeholder="user_123" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-background" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 1;">lock</span>
<input class="w-full sunken-input pl-xl pr-sm py-3 font-body-md text-body-md focus:outline-none focus:ring-0" id="password" placeholder="••••••••" type="password"/>
</div>
<div class="flex justify-end mt-xs">
<a class="font-label-sm text-label-sm text-outline hover:text-primary transition-colors" href="#">Forgot password?</a>
</div>
</div>
<!-- Sign In Button -->
<button class="mt-sm w-full bg-primary text-on-primary pixel-border hard-shadow-dark btn-active font-body-md text-body-md font-bold py-3 transition-transform flex items-center justify-center gap-sm" type="submit">
                Sign In
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">login</span>
</button>
<!-- Divider -->
<div class="flex items-center gap-sm my-md">
<div class="h-px bg-outline-variant flex-1"></div>
<span class="font-label-sm text-label-sm text-outline-variant">OR</span>
<div class="h-px bg-outline-variant flex-1"></div>
</div>
<!-- Sign Up Link -->
<div class="text-center mb-sm">
<p class="font-body-md text-body-md text-on-surface-variant">Don't have an account?</p>
<a class="inline-block mt-xs font-body-md text-body-md font-bold text-secondary hover:text-secondary-fixed-dim transition-colors border-b-2 border-transparent hover:border-secondary" href="#">Create an account</a>
</div>
</form>
</main>
</body></html>
