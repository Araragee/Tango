<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .pixel-border { border: 2px solid #1c1c19; }
        .pixel-border-sm { border: 1px solid #1c1c19; }
        .hard-shadow { box-shadow: 4px 4px 0px 0px #983e4b; }
        .hard-shadow-dark { box-shadow: 4px 4px 0px 0px #1c1c19; }
        .btn-active:active { transform: translate(2px, 2px); box-shadow: none !important; }
        .bg-dither { background-image: repeating-linear-gradient(45deg, #e5e2dd 25%, transparent 25%, transparent 75%, #e5e2dd 75%, #e5e2dd), repeating-linear-gradient(45deg, #e5e2dd 25%, #fcf9f4 25%, #fcf9f4 75%, #e5e2dd 75%, #e5e2dd); background-position: 0 0, 4px 4px; background-size: 8px 8px; }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body-md bg-dither min-h-screen">
<!-- TopAppBar from JSON -->
<header class="bg-surface border-b-2 border-black flex justify-between items-center w-full px-6 py-4 max-w-full sticky top-0 z-40">
<button class="hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all active:translate-x-[2px] active:translate-y-[2px] active:shadow-none text-on-surface p-2">
<span class="material-symbols-outlined">favorite</span>
</button>
<h1 class="text-2xl font-black text-primary italic font-headline-md m-0">TANGO</h1>
<button class="hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all active:translate-x-[2px] active:translate-y-[2px] active:shadow-none text-on-surface p-2">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="max-w-md mx-auto p-gutter pt-8 pb-24">
<!-- Task Navigation -->
<button class="mb-lg flex items-center gap-2 bg-surface text-on-surface pixel-border hard-shadow btn-active font-label-sm text-label-sm font-bold px-4 py-2 transition-transform uppercase">
<span class="material-symbols-outlined" style="font-size: 16px;">arrow_back</span>
            Back to Budget
        </button>
<!-- Receipt Card -->
<article class="bg-surface pixel-border p-6 sm:p-8 relative overflow-hidden hard-shadow">
<!-- Receipt Header -->
<div class="text-center mb-6">
<h2 class="font-headline-lg text-headline-lg font-black uppercase tracking-tight text-on-surface mb-1">Pizza Night</h2>
<p class="font-label-sm text-label-sm text-outline uppercase tracking-widest">Luigi's Pizzeria</p>
</div>
<div class="border-b-2 border-dashed border-outline mb-6"></div>
<!-- Amount Focus -->
<div class="text-center mb-6">
<p class="font-label-sm text-label-sm text-outline uppercase mb-2">Total Paid</p>
<div class="font-headline-xl text-headline-xl font-black text-primary tracking-tighter">
                    $45.50
                </div>
</div>
<div class="border-b-2 border-dashed border-outline mb-6"></div>
<!-- Line Items -->
<ul class="space-y-4 mb-8">
<li class="flex justify-between items-center border-b border-surface-variant pb-2">
<span class="font-label-sm text-label-sm text-outline uppercase">Date</span>
<span class="font-body-md text-body-md font-bold text-on-surface">Oct 24, 2023</span>
</li>
<li class="flex justify-between items-center border-b border-surface-variant pb-2">
<span class="font-label-sm text-label-sm text-outline uppercase">Category</span>
<span class="bg-secondary-container text-on-secondary-container pixel-border-sm font-label-sm text-label-sm px-3 py-1 uppercase flex items-center gap-1">
<span class="material-symbols-outlined" style="font-size: 14px;">restaurant</span>
                        Dining
                    </span>
</li>
<li class="flex justify-between items-center pb-2">
<span class="font-label-sm text-label-sm text-outline uppercase">Payer</span>
<span class="font-body-md text-body-md font-bold text-on-surface flex items-center gap-2">
<img alt="Alex's avatar" class="w-6 h-6 pixel-border object-cover" data-alt="close-up pixel art style portrait of a young man with short dark hair against a warm background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCL3wUUtAdZ5tk7V9nlmxz9FyRBuWsqMtvjVwEAhyEHQ-9emtKWFmhUAbpbLarYd5QuTGA0l1ch_bygHEqqu_z74eLFrC3RlgyAMArvaL8IBcfoBc7ZLp-lB9cJZnbBxWZiPDKjqvJ7siOZF_BwkWrXvvDCnGGth-t73gX7H-0KRWlJtSs03nr6z_Z8_drdq-wHw4NmPFmVX0QQbJhN_nLhgi7t3xhfgFJhvnMWZE6KoGt9jaufAoEkkviKxZ_peK_iZlnBa-cTCHU"/>
                        Alex
                    </span>
</li>
</ul>
<!-- Tactical Split Visualization -->
<div class="mb-8 pixel-border bg-surface-container-low p-4 hard-shadow-dark">
<div class="flex justify-between items-end mb-2">
<p class="font-label-sm text-label-sm text-on-surface uppercase">Split Breakdown</p>
<p class="font-label-sm text-label-sm text-outline">50 / 50</p>
</div>
<div class="h-8 pixel-border bg-surface-variant relative flex overflow-hidden">
<!-- Alex's Share -->
<div class="w-1/2 bg-primary border-r-2 border-on-surface flex items-center justify-center">
<span class="font-label-sm text-label-sm text-on-primary">Alex ($22.75)</span>
</div>
<!-- Your Share -->
<div class="w-1/2 bg-surface-container flex items-center justify-center">
<span class="font-label-sm text-label-sm text-on-surface">You ($22.75)</span>
</div>
</div>
</div>
<!-- Action Cluster -->
<div class="flex flex-col gap-4">
<button class="w-full bg-surface text-on-surface pixel-border hard-shadow-dark btn-active font-body-md text-body-md font-bold px-6 py-3 transition-transform flex items-center justify-center gap-2 uppercase tracking-widest">
<span class="material-symbols-outlined" style="font-size: 18px;">call_split</span>
                    Edit Split
                </button>
<button class="w-full bg-primary text-on-primary pixel-border hard-shadow-dark btn-active font-body-md text-body-md font-bold px-6 py-3 transition-transform flex items-center justify-center gap-2 uppercase tracking-widest">
<span class="material-symbols-outlined" style="font-size: 18px;">category</span>
                    Recategorize
                </button>
</div>
</article>
</main>
</body></html>
