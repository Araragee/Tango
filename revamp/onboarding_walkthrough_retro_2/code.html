<style>
        .pixel-border {
            border: 2px solid #1c1c19;
        }
        .hard-shadow-red {

        }

        }
        .active-btn:active {
            box-shadow: none;
            transform: translate(2px, 2px);
        }

            background-image: linear-gradient(45deg, #dac0c1 25%, transparent 25%),

        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-md overflow-hidden" style="background-image: radial-gradient(#dac0c1 1px, transparent 1px); background-size: 16px 16px;">
<!-- Main Container -->
<main class="w-full max-w-md h-[707px] flex flex-col bg-surface-container-low pixel-border hard-shadow-green p-lg relative z-10">
<!-- Header / Skip -->
<header class="flex justify-between items-center mb-xl">
<div class="font-headline-md text-headline-md text-primary italic font-black tracking-tighter">

            </div>
<button class="font-label-sm text-label-sm text-outline uppercase tracking-wider hover:text-on-surface transition-colors">
                Skip
            </button>
</header>
<!-- Carousel Content Area -->
<div class="flex-1 flex flex-col items-center justify-center text-center space-y-xl">
<!-- Pixel Illustration Container -->
<div class="w-48 h-48 bg-surface-container-lowest pixel-border hard-shadow-red flex items-center justify-center mb-md relative">

<div class="absolute top-0 left-0 w-4 h-4 dither-bg border-r-2 border-b-2 border-on-background"></div>
<div class="absolute bottom-0 right-0 w-4 h-4 dither-bg border-l-2 border-t-2 border-on-background"></div>

<span class="material-symbols-outlined text-[80px] text-primary" style="font-variation-settings: 'FILL' 1;">
                    favorite
                </span>
</div>
<!-- Text Content -->
<div class="space-y-sm px-sm">
<h1 class="font-headline-lg text-headline-lg text-on-surface">
                    Syncing Dreams

<p class="font-body-md text-body-md text-on-surface-variant">

                </p>
</div>
</div>

<div class="flex space-x-sm">

<div class="w-3 h-3 bg-surface-variant pixel-border"></div>

</div>
