<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" shape-rendering="crispEdges">
  <title>Tango</title>
  <!-- Brand background — primary navy from the design system -->
  <rect width="512" height="512" fill="#3c5f7d"/>

  <!-- Pixel-style heart, centred in a 512x512 canvas (cell size 32, 12x12 grid of cells centred) -->
  <!-- Each cell is 32x32 pixels; heart drawn in 9x8 cells starting at (96,96). -->
  <g fill="#f5d5d6">
    <!-- Row 1 -->
    <rect x="128" y="128" width="64" height="32"/>
    <rect x="320" y="128" width="64" height="32"/>
    <!-- Row 2 -->
    <rect x="96"  y="160" width="128" height="32"/>
    <rect x="288" y="160" width="128" height="32"/>
    <!-- Row 3 (heart bowl full) -->
    <rect x="96"  y="192" width="320" height="32"/>
    <!-- Row 4 -->
    <rect x="96"  y="224" width="320" height="32"/>
    <!-- Row 5 -->
    <rect x="128" y="256" width="256" height="32"/>
    <!-- Row 6 -->
    <rect x="160" y="288" width="192" height="32"/>
    <!-- Row 7 -->
    <rect x="192" y="320" width="128" height="32"/>
    <!-- Row 8 (tip) -->
    <rect x="224" y="352" width="64" height="32"/>
  </g>

  <!-- Highlight pixel (lighter pink) for the retro-pixel feel -->
  <g fill="#ffffff" opacity="0.55">
    <rect x="128" y="160" width="32" height="32"/>
    <rect x="160" y="192" width="32" height="32"/>
  </g>

  <!-- Dark outline pixels framing the heart for contrast -->
  <g fill="#1f2733">
    <!-- left side -->
    <rect x="96"  y="160" width="32" height="32"/>
    <rect x="64"  y="192" width="32" height="32"/>
    <rect x="64"  y="224" width="32" height="32"/>
    <rect x="96"  y="256" width="32" height="32"/>
    <rect x="128" y="288" width="32" height="32"/>
    <rect x="160" y="320" width="32" height="32"/>
    <rect x="192" y="352" width="32" height="32"/>
    <rect x="224" y="384" width="64" height="32"/>
    <!-- right side -->
    <rect x="384" y="160" width="32" height="32"/>
    <rect x="416" y="192" width="32" height="32"/>
    <rect x="416" y="224" width="32" height="32"/>
    <rect x="384" y="256" width="32" height="32"/>
    <rect x="352" y="288" width="32" height="32"/>
    <rect x="320" y="320" width="32" height="32"/>
    <rect x="288" y="352" width="32" height="32"/>
    <!-- top notches -->
    <rect x="128" y="128" width="32" height="32"/>
    <rect x="160" y="96"  width="64" height="32"/>
    <rect x="288" y="96"  width="64" height="32"/>
    <rect x="352" y="128" width="32" height="32"/>
    <rect x="224" y="128" width="64" height="32"/>
  </g>
</svg>
